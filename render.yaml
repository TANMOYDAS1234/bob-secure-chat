services:
  - type: web
    name: bob-secure-chat
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn unified_secure_server:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    envVars:
      - key: PEER_URL
        value: https://alice-secure-chat.onrender.com/receive
      - key: QC_SERVER
        value: https://qc-secure-server.onrender.com
